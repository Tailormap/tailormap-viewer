<div class="page">
  <div class="viewers">
    @for (name of viewerNames; track name; let index = $index) {
      <section class="viewer-block">
        <h2>Viewer: <code>app/{{ name }}</code></h2>
        <div class="viewer-controls">
          <button
            mat-stroked-button
            color="primary"
            type="button"
            [disabled]="!viewerRefs[index]"
            (click)="zoomToDemoLocation(index)"
          >Zoom to {{ demoLocations[index].label }}</button>
          <button
            mat-stroked-button
            color="primary"
            type="button"
            [disabled]="!viewerRefs[index]"
            (click)="loadNextApp(index)"
          >Load next app</button>
        </div>
        <div #viewerHost class="viewer-host"></div>
      </section>
    }
  </div>
  <div class="footer">
    Footer content
  </div>
</div>
