<div
  class="map-container"
  tabindex="0"
  (mousedown)="mouseDown = true"
  (focus)="onFocus()"
  (blur)="mapFocusedByKeyboard = false"
  (keydown.enter)="onEnterKey()"></div>
<div class="map-focus-indicator" [class.map-focus-indicator--visible]="mapFocusedByKeyboard"></div>


@if (inIframe) {
  <div class="embedded-overlay"><div class="message"></div></div>
}
