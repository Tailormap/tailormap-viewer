@let imgError = imageError();
@let imgContent = imageContent();
@let isSaved = isImageSaved();
<div class="form-field">
  @if (imgError) {
    <tm-error-message [message]="imgError" [friendlyError]="true"></tm-error-message>
  }
  <div class="img-space">
    @if (imgContent) {
      <img [src]="imgContent" i18n-alt="@@admin-core.application.current-image" alt="Current image"/>
    }
    <div class="upload-wrapper" [class.upload-complete]="isSaved">
      <input type="file"
        [accept]="acceptedImageTypes()"
        (change)="fileChangeEvent($event)"
        class="fileInputProfile">
      @if (isSaved || imgContent) {
        <button mat-stroked-button
          color="warn"
          tmTooltip="Remove the image"
          i18n-tmTooltip="@@admin-core.application.remove-image"
          (click)="clearImage()">
          <mat-icon svgIcon="trash_filled"></mat-icon>
        </button>
      }
    </div>
  </div>
</div>
