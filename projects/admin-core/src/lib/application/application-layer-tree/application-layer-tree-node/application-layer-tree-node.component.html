@if (node) {
  <div
    class="tree-node"
    [class.level]="isLevel()">
    <div class="tree-node__label">
      <span class="tree-node__icon">
        <mat-icon [attr.aria-label]="node.label" [svgIcon]="getIcon()"></mat-icon>
      </span>
      <span class="tree-node__label-content">
        <span class="tree-node__label-text">{{node.label}}</span>
        @if (isLevel()) {
          <span
            class="tree-node__startup-state-icon"
            [matTooltip]="getExpandOnStartupTooltip()"
            [attr.aria-label]="getExpandOnStartupTooltip()">
            <mat-icon [svgIcon]="getExpandedOnStartupIcon()"></mat-icon>
          </span>
        }
      </span>
    </div>
    <div class="tree-node__actions">
      @if (isLayer()) {
        <button mat-icon-button
          matTooltip="Remove layer from application"
          i18n-matTooltip="@@admin-core.application.remove-layer"
          (click)="removeNode($event, node.id)">
          <mat-icon svgIcon="close"></mat-icon>
        </button>
      }
      @if (!isNonRoot() && applicationStateTree !== 'terrainLayer') {
        <button mat-icon-button
          matTooltip="Add sub folder"
          i18n-matTooltip="@@admin-core.application.add-sub-folder"
          (click)="addFolder($event, node.id)">
          <mat-icon svgIcon="plus"></mat-icon>
        </button>
      }
      @if (isLevel() && isNonRoot()) {
        <button mat-icon-button
          [matMenuTriggerFor]="menu"
          aria-label="Tree node menu">
          <mat-icon svgIcon="admin_more"></mat-icon>
        </button>
      }
      <mat-menu #menu="matMenu">
        <button mat-menu-item
          (click)="addFolder($event, node.id)">
          <mat-icon svgIcon="plus"></mat-icon>
          <span i18n="@@admin-core.application.add-sub-folder">Add sub folder</span>
        </button>
        <button mat-menu-item
          (click)="renameFolder($event, node.id, node.label)">
          <mat-icon svgIcon="edit"></mat-icon>
          <span i18n="@@admin-core.application.rename">Rename</span>
        </button>
        <button mat-menu-item
          (click)="removeNodeFromMenu(node.id)">
          <mat-icon svgIcon="close"></mat-icon>
          <span i18n="@@admin-core.application.remove">Remove</span>
        </button>
        <div class="expand-on-startup-wrapper">
          <mat-form-field appearance="outline" class="expand-on-startup">
            <mat-label i18n="@@admin-core.application.expand-on-startup">Expand on startup</mat-label>
            <mat-select
              [value]="getExpandOnStartup()"
              (click)="$event.stopPropagation()"
              (selectionChange)="setExpandOnStartup($event.value)">
              <mat-option value="automatic" i18n="@@admin-core.application.expand-on-startup-automatic">Automatic</mat-option>
              <mat-option value="alwaysExpand" i18n="@@admin-core.application.expand-on-startup-always">Always expand</mat-option>
              <mat-option value="neverExpand" i18n="@@admin-core.application.expand-on-startup-never">Never expand</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
      </mat-menu>
    </div>
  </div>
}
