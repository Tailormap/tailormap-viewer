<tm-admin-base-component-config [type]="type"
                                [label]="label"
                                [config]="config"
                                i18n-titleLabel="@@admin-core.components.snapping-tooltip"
                                titleLabel="Snapping tooltip">
  <ng-container>
    <div class="row">
      <mat-form-field>
        <mat-label i18n="@@admin-core.components.snapping-tolerance">Snapping tolerance (px)</mat-label>
        <input matInput type="number" [formControl]="tolerance" />
      </mat-form-field>
    </div>
    <div class="row">
      <div class="label" i18n="@@admin-core.components.snapping-select-layers">Select one or more layers which are available for snapping. Select at least one layer to allow snapping.</div>
      <tm-admin-layer-selection-config-component [formControl]="selectedLayers" [withAttributesOnly]="true"></tm-admin-layer-selection-config-component>
    </div>
  </ng-container>
</tm-admin-base-component-config>
